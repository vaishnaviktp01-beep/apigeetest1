name: Deploy Apigee API Proxy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Apigee eval
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Apigee eval
        run: |
          mvn deploy -P eval -ntp \
            -Dapigee.org=${{ secrets.APIGEE_ORG }} \
            -Dapigee.env=eval

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apigee-proxy-bundle
          path: target/*.zip
          retention-days: 10
